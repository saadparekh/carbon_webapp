<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EarthMate</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background: linear-gradient(135deg, #f0f9eb 0%, #e6f4f1 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px);} to { opacity: 1; transform: translateY(0);} }

    header {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      color: white;
      padding: 25px 30px;
      text-align: center;
    }

    header h1 { font-size: 2.5rem; margin-bottom: 5px; font-weight: 700; }
    header p { font-size: 1.1rem; opacity: 0.9; }

    .nav { display: flex; border-bottom: 1px solid #e0e0e0; }
    .nav-item {
      flex: 1; text-align: center; padding: 18px;
      font-weight: 600; color: #555; cursor: pointer; transition: all 0.3s ease;
    }
    .nav-item.active { color: #27ae60; border-bottom: 3px solid #27ae60; background: #f9fdfb; }
    .nav-item:hover { background-color: #f9f9f9; }

    .content { padding: 30px; display: none; }
    .content.active { display: block; animation: fadeIn 0.6s ease-in-out; }

    /* Chat Box */
    .chat-box {
      display: flex; flex-direction: column; height: 450px; border-radius: 12px;
      background: #ece5dd; overflow: hidden; border: 1px solid #ccc; position: relative;
    }
    .messages {
      flex: 1; padding: 20px; overflow-y: auto;
      background: #e5ddd5; display: flex; flex-direction: column; gap: 10px;
    }
    .msg {
      padding: 10px 14px; border-radius: 20px; max-width: 70%;
      font-size: 0.95rem; line-height: 1.4; position: relative;
    }
    /* ✅ User green bubble */
    .msg.user {
      background: #34D399;      /* Tailwind emerald green */
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }
    /* ✅ Bot white bubble */
    .msg.bot {
      background: #ffffff;
      color: #2c3e50;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
      border: 1px solid #ddd;
    }

    .chat-input { display: flex; border-top: 1px solid #ccc; background: #f0f0f0; }
    .chat-input input {
      flex: 1; padding: 14px; border: none; outline: none; font-size: 1rem; background: #fff;
    }
    .chat-input button {
      background: #27ae60; color: white; border: none; padding: 0 25px;
      font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s ease;
    }
    .chat-input button:hover { background: #219653; }

    footer { text-align: center; padding: 20px; color: #7f8c8d; font-size: 0.9rem; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>EarthMate</h1>
      <p>Your partner for the planet</p>
    </header>

    <div class="nav">
      <div class="nav-item active" data-target="chat">Ask EarthMate</div>
    </div>

    <!-- Chat -->
    <div class="content active" id="chat">
      <div class="chat-box">
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Ask about carbon footprint..." />
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>

    <footer><p>© 2025 EarthMate - Making the planet greener one step at a time</p></footer>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(content, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerText = content;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    sendBtn.addEventListener("click", sendMessage);
    chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      addMessage(text, "user");
      chatInput.value = "";
      fetch("/chat", {  // ✅ relative path
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      })
      .then((res) => res.json())
      .then((data) => { addMessage(data.reply || "Error: No response", "bot"); })
      .catch(() => addMessage("Error connecting to server", "bot"));
    }
  </script>
</body>
</html>
